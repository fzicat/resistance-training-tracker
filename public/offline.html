<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RTT — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #282828;
        color: #ebdbb2;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      main {
        max-width: 22rem;
        text-align: center;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        color: #fe8019;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>RTT will reconnect automatically when your internet is back.</p>
    </main>
  </body>
</html>
